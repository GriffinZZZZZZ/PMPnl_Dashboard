# Dark "financial terminal" theme. Custom CSS in app/components/theme.py builds on
# these tokens for KPI cards, status chips, and typography. Charts remain native.
[theme]
base = "dark"
primaryColor = "#36CFC9"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#171B26"
textColor = "#E6E9EF"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
