# Base theme aligned to the default "Midnight" palette. The runtime theme selector
# in app/components/theme.py injects palette-driven CSS that can override these (so
# users can switch between several dark palettes and a light one at runtime).
[theme]
base = "dark"
primaryColor = "#4FD1C5"
backgroundColor = "#0F141C"
secondaryBackgroundColor = "#161D29"
textColor = "#E7ECF5"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
